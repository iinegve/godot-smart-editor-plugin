name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive \
            --format=zip \
            --output="smart-editor-plugin-${VERSION}.zip" \
            HEAD

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "$VERSION" \
            "smart-editor-plugin-${VERSION}.zip" \
            --title "$VERSION" \
            --notes "Smart Editor ${VERSION}"
