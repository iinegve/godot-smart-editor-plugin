name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          fi
          case "$VERSION" in
            v*) ;;
            *)
              echo "Release version must start with 'v', for example v0.1.0."
              exit 1
              ;;
          esac
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          git archive \
            --format=zip \
            --output="smart-editor-plugin-${VERSION}.zip" \
            HEAD

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            "smart-editor-plugin-${VERSION}.zip" \
            --title "$VERSION" \
            --notes "Smart Editor ${VERSION}" \
            --target "$GITHUB_SHA"
